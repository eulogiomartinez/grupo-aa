<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grupo AA – Una luz en mi camino</title>

  <style>
    * {
      box-sizing: border-box;
    }

         body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      /* Capa oscura (gradiente) + tu imagen de fondo de fondo-manos.jpg */
      background: linear-gradient(rgba(11, 28, 45, 0.82), rgba(16, 42, 67, 0.85)), 
                  url("fondo.jpeg") no-repeat center center;
      background-size: cover;
      background-attachment: fixed; /* Hace que el fondo se quede quieto al hacer scroll */
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* CONTENEDOR PRINCIPAL (ESTILO TARJETA) */
    .contenedor {
      width: 100%;
      max-width: 450px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 30px 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    /* LOGO INTEGRADO */
    .logo-container {
      width: 130px;
      height: 130px;
      margin: 0 auto 20px auto;
      background: url("alcoholicos-anonimos-logo-png_seeklogo-6138.png") no-repeat center;
      background-size: contain;
      filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.3));
    }

    h1 {
      color: #4da3ff;
      font-size: 24px;
      margin: 0 0 25px 0;
      line-height: 1.3;
    }

    /* BOTONES */
    .boton {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
      padding: 15px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      width: 100%;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .boton:active {
      transform: scale(0.98);
    }

    .horarios-btn { background: #1e90ff; }
    .maps { background: #4285F4; }
    .whatsapp { background: #25D366; }

    /* SECCIÓN HORARIOS */
    .horarios {
      display: none;
      margin: -5px 0 15px 0;
      background: rgba(255, 255, 255, 0.07);
      padding: 15px;
      border-radius: 12px;
      color: #00d4ff;
      border: 1px dashed rgba(255, 255, 255, 0.2);
      animation: fadeIn 0.3s ease;
    }
 
    .horarios p {
      margin: 5px 0;
      font-size: 15px;
      color: #ffffff; 
    }

    /* MINI BOT DE CONSULTAS */
    #bot-burbuja {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background: #0076ff;
      color: white;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      z-index: 100;
    }

    #bot-chat {
      display: none;
      position: fixed;
      bottom: 95px;
      right: 25px;
      width: 290px;
      background: #143152;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      z-index: 100;
      animation: fadeIn 0.2s ease;
      color: #00d4ff;
      backdrop-filter: blur(10px);

      }

    #bot-chat p {
      margin-top: 0;
      font-size: 15px;
      line-height: 1.4;
    }

    #bot-chat button {
      width: 100%;
      margin-top: 8px;
      padding: 11px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: background 0.2s;
    }

    #bot-chat button:hover {
      background: rgba(255,255,255,0.2);
    }

    #bot-respuesta {
      margin-top: 12px;
      font-size: 14px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
      transition: opacity 0.3s ease, max-height 0.3s ease;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      color: #00d4ff;
    }

    #bot-respuesta.mostrar {
      opacity: 1;
      padding: 10px;
      max-height: 500px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  
       /* 📱 ADAPTACIÓN PARA ESCRITORIO (@media) */
    @media (min-width: 768px) {
      .contenedor {
        max-width: 500px;
        padding: 40px 30px;
        background: rgba(16, 42, 67, 0.6);
      }
      h1 {
        font-size: 28px;
      }
      .boton:hover {
        filter: brightness(1.1);
        transform: translateY(-2px);
      }
      #bot-chat {
        width: 320px;
      }
    }
 </style>
</head>

<body>

<div class="contenedor">
  <div class="logo-container"></div>
  
  <h1>Grupo de AA<br>Una luz en mi camino</h1>

  <button class="boton horarios-btn" onclick="toggleHorarios()">🕒 Ver horarios</button>

  <div class="horarios">
    <p><strong>Horarios del grupo</strong></p>
    <p>Lunes a Sábado: 8:00 PM – 9:30 PM</p>
    <p>Domingo: Cerrado</p>
  </div>

  <a class="boton maps" href="https://maps.app.goo.gl/CkVj6bCxg8EmCzt8A" target="_blank">
    📍 Ver ubicación
  </a>

  <a class="boton whatsapp" href="https://wa.me/5218117285695" target="_blank">
    💬 Hablar por WhatsApp
  </a>
</div>

<!-- Burbuja del Bot -->
<div id="bot-burbuja">💬</div>

<!-- Ventana del Bot -->
<div id="bot-chat">
  <p><strong>👋 Hola</strong><br>¿Cómo puedo ayudarte?</p>
  <button onclick="botRespuesta('requisitos')">📋 Requisitos</button>
  <button onclick="botRespuesta('costos')">💲 Costos</button>
  <button onclick="botRespuesta('nosotros')">👥 Sobre Nosotros</button>
  <button onclick="botRespuesta('preguntas')">❓ Dudas Comunes</button>
  <div id="bot-respuesta"></div>
</div>

<script>
// 1. Control de los Horarios del Grupo
function toggleHorarios() {
  const h = document.querySelector('.horarios');
  h.style.display = h.style.display === "block" ? "none" : "block";
}

// Variables globales para el chat del bot
const burbuja = document.getElementById("bot-burbuja");
const chat = document.getElementById("bot-chat");
let seccionActiva = ""; // Recuerda qué botón está abierto

// 2. Control de abrir/cerrar el Chat con la Burbuja flotante
burbuja.onclick = () => {
  const r = document.getElementById("bot-respuesta");
  if (chat.style.display === "block") {
    chat.style.display = "none";
    burbuja.innerHTML = "💬"; // Vuelve al icono normal
    
    // Limpia las respuestas para que no se queden fijas al cerrar
    r.classList.remove("mostrar");
    r.innerHTML = "";
    seccionActiva = "";
  } else {
    chat.style.display = "block";
    burbuja.innerHTML = "❌"; // Cambia a cruz cuando está abierto
  }
};

// 3. Control de las Respuestas del Mini Bot (Menú Inteligente)
function botRespuesta(tipo) {
  const r = document.getElementById("bot-respuesta");

  // SI EL USUARIO DA CLIC AL MISMO BOTÓN QUE YA ESTÁ ABIERTO, SE OCULTA
  if (seccionActiva === tipo) {
    r.classList.remove("mostrar");
    seccionActiva = ""; 
    setTimeout(() => {
      r.innerHTML = "";
    }, 150);
    return; 
  }

  // Si es un botón nuevo, primero ocultamos lo anterior y registramos el nuevo
  r.classList.remove("mostrar");
  seccionActiva = tipo; 

  let contenido = "";

  if (tipo === "preguntas") {
    contenido = `
      <p><strong>❓ Dudas Frecuentes:</strong></p>
      <p><strong>🏢 ¿Es un anexo?</strong><br>
      No, aquí nadie se queda encerrado. Asistes por tu propia voluntad y regresas a tu casa al terminar la sesión.</p>
      <p><strong>⏰ ¿Cuánto dura?</strong><br>
      La sesión dura 1 hora y media (8:00 PM a 9:30 PM).</p>
      <p><strong>🙏 ¿Son religiosos?</strong><br>
      No. Es un programa espiritual, no religioso. Respetamos la creencia de cada miembro.</p>
    `;
  }
  if (tipo === "requisitos") {
    contenido = `
      <p><strong>📋 Requisitos</strong></p>
      <p>El único requisito para ser miembro de AA es el deseo de dejar de beber.</p>
    `;
  }
  if (tipo === "costos") {
    contenido = `
      <p><strong>$ Costos</strong></p>
      <p>AA no tiene honorarios ni cuotas. Nos mantenemos con nuestras propias contribuciones.</p>
    `;
  }
  if (tipo === "nosotros") {
    contenido = `
      <p><strong>👥 Sobre Nosotros</strong></p>
      <p>AA es una comunidad de personas que comparten su experiencia, fortaleza y esperanza para resolver su problema común y ayudar a otros a recuperarse del alcoholismo.</p>
    `;
  }

  // Esperar a que se oculte el anterior para cambiar el texto suavemente con animación
  setTimeout(() => {
    r.innerHTML = contenido;
    r.classList.add("mostrar");
  }, 150);
}
</script>

</body>
</html>
